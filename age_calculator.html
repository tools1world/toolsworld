<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pro Age Analyzer | Tools World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.05);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(59, 130, 246, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-input:focus {
            background: white;
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
            outline: none;
        }

        .bento-card {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="p-6">

    <div class="mb-10 text-center">
        <h2 class="text-blue-600 text-3xl font-bold tracking-tighter italic">Tools <span class="text-slate-400 font-light">World</span></h2>
        <p class="text-slate-500 text-[10px] tracking-[0.4em] uppercase mt-1">Life Chronology Engine</p>
    </div>

    <main class="liquid-glass p-8 md:p-12 max-w-xl w-full">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-white text-blue-600 rounded-2xl mb-4 shadow-sm border border-slate-100">
                <i class="fas fa-birthday-cake text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Age Calculator</h1>
            <p class="text-slate-500 text-sm mt-1">Discover exactly how long you've been on this journey.</p>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Date of Birth</label>
                <input type="date" id="dob" class="glass-input w-full p-4 rounded-2xl text-slate-800" />
            </div>

            <button onclick="calculateAge()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-95">
                Calculate Age
            </button>

            <div id="resultGrid" class="hidden space-y-4 pt-6 animate-pop">
                <div class="grid grid-cols-3 gap-3">
                    <div class="bento-card">
                        <p class="text-[10px] font-bold text-blue-500 uppercase mb-1">Years</p>
                        <p id="resYears" class="text-2xl font-bold text-slate-800">0</p>
                    </div>
                    <div class="bento-card">
                        <p class="text-[10px] font-bold text-blue-500
