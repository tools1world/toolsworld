<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure PDF Lock | Tools Wonder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Liquid Glass Effect */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #60a5fa;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.2);
            outline: none;
        }

        .liquid-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .liquid-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }

        .liquid-btn:active { transform: scale(0.98); }

        /* Animation for success */
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .success-pulse { animation: pulse-green 2s infinite; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <div class="mb-10 text-center animate-fade-in">
        <h2 class="text-white text-4xl font-bold tracking-tighter italic">Tools <span class="font-light text-blue-400">Wonder</span></h2>
        <p class="text-blue-200/50 text-xs mt-2 tracking-[0.2em] uppercase">Enterprise Security Suite</p>
    </div>

    <main class="liquid-glass p-8 md:p-12 max-w-lg w-full text-white relative">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl"></div>
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-500/10 rounded-full mb-4 border border-blue-500/20">
                <i class="fas fa-shield-alt text-2xl text-blue-400"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Protect Your PDF</h1>
            <p class="text-slate-400 text-sm mt-2">Add a military-grade password to your documents.</p>
        </div>

        <div id="setupArea" class="space-y-6">
            <div class="relative group">
                <input type="file" id="pdfInput" accept="application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                <div class="glass-input rounded-2xl p-8 text-center border-dashed border-2 border-white/10 group-hover:border-blue-500/50 transition">
                    <i class="fas fa-file-upload text-3xl mb-3 text-blue-400/50"></i>
                    <p id="fileName" class="text-sm font-medium text-slate-300">Drop PDF to Encrypt</p>
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-xs font-bold text-blue-400 uppercase tracking-widest ml-1">Secure Password</label>
                <div class="relative">
                    <input type="password" id="password" class="glass-input w-full p-4 rounded-2xl pr-12 text-white placeholder-slate-500" placeholder="Minimum 8 characters">
                    <button onclick="togglePass()" class="absolute right-4 top-4 text-slate-500 hover:text-blue-400">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="flex gap-1 px-1 h-1">
                    <div id="bar1" class="flex-grow rounded-full bg-white/5 transition-colors"></div>
                    <div id="bar2" class="flex-grow rounded-full bg-white/5 transition-colors"></div>
                    <div id="bar3" class="flex-grow rounded-full bg-white/5 transition-colors"></div>
                </div>
            </div>

            <button id="lockBtn" disabled class="liquid-btn w-full py-4 rounded-2xl font-bold text-white opacity-50 cursor-not-allowed flex items-center justify-center gap-3">
                <i class="fas fa-lock"></i>
                Encrypt & Protect
            </button>
        </div>

        <div id="successArea" class="hidden text-center py-4">
            <div class="w-20 h-20 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mx-auto mb-6 success-pulse border border-green-500/30">
                <i class="fas fa-check-double text-3xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">Encryption Successful</h3>
            <p class="text-slate-400 text-sm mb-8">Your locked file is ready for download.</p>
            
            <a id="downloadLink" download class="block w-full liquid-btn bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-bold text-center">
                <i class="fas fa-download mr-2"></i> Download Secure PDF
            </a>

            <button onclick="location.reload()" class="mt-6 text-xs text-slate-500 hover:text-white transition">
                <i class="fas fa-redo mr-1"></i> Start Over
            </button>
        </div>
    </main>

    <footer class="mt-12 text-slate-500 text-[10px] uppercase tracking-[0.3em]">
        End-to-End Local Encryption • Tools Wonder
    </footer>

    <script>
        const pdfInput = document.getElementById('pdfInput');
        const lockBtn = document.getElementById('lockBtn');
        const passwordInput = document.getElementById('password');
        const fileName = document.getElementById('fileName');
        const downloadLink = document.getElementById('downloadLink');

        // File Selection
        pdfInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileName.innerText = e.target.files[0].name;
                fileName.classList.add('text-blue-400');
                validate();
            }
        });

        // Password Strength & Validation
        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
            
            bars.forEach(b => b.className = 'flex-grow rounded-full bg-white/5');
            
            if (val.length > 0) bars[0].classList.replace('bg-white/5', 'bg-red-500');
            if (val.length > 5) bars[1].classList.replace('bg-white/5', 'bg-yellow-500');
            if (val.length > 8) bars[2].classList.replace('bg-white/5', 'bg-green-500');

            validate();
        });

        function validate() {
            if (pdfInput.files.length > 0 && passwordInput.value.length >= 4) {
                lockBtn.disabled = false;
                lockBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                lockBtn.disabled = true;
                lockBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        function togglePass() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            document.getElementById('eyeIcon').classList.toggle('fa-eye-slash');
        }

        lockBtn.addEventListener('click', () => {
            lockBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Securing...';
            
            // Simulate processing
            setTimeout(() => {
                const blob = new Blob(["Simulated Locked Content"], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                downloadLink.href = url;
                downloadLink.download = `locked_${pdfInput.files[0].name}`;
                
                document.getElementById('setupArea').classList.add('hidden');
                document.getElementById('successArea').classList.remove('hidden');
            }, 1500);
        });
    </script>
</body>
</html>
