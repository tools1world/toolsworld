<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pro BMI Analyzer | Tools Wonder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #bae6fd 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
            border-radius: 40px;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 123, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: white;
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .bmi-scale {
            height: 8px;
            background: linear-gradient(to right, #60a5fa, #4ade80, #facc15, #f87171);
            border-radius: 10px;
            position: relative;
        }

        .indicator {
            width: 4px;
            height: 16px;
            background: #1e293b;
            position: absolute;
            top: -4px;
            transition: left 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 2px;
        }
    </style>
</head>
<body class="p-6">

    <div class="mb-10 text-center">
        <h2 class="text-blue-600 text-3xl font-bold tracking-tighter">Tools <span class="text-slate-400 font-light">Wonder</span></h2>
        <p class="text-slate-500 text-[10px] tracking-[0.3em] uppercase mt-1">Health & Wellness Engine</p>
    </div>

    <main class="liquid-glass p-8 md:p-12 max-w-md w-full">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 text-white rounded-2xl mb-4 shadow-lg shadow-blue-200">
                <i class="fas fa-heartbeat text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">BMI Analyzer</h1>
            <p class="text-slate-500 text-sm mt-1">Calculate your Body Mass Index instantly.</p>
        </div>

        <div class="space-y-6">
            <div class="space-y-4">
                <div class="relative">
                    <span class="absolute right-4 top-4 text-xs font-bold text-slate-400">KG</span>
                    <input type="number" id="weight" class="glass-input w-full p-4 rounded-2xl text-slate-800 placeholder-slate-400" placeholder="Weight" />
                </div>
                <div class="relative">
                    <span class="absolute right-4 top-4 text-xs font-bold text-slate-400">CM</span>
                    <input type="number" id="height" class="glass-input w-full p-4 rounded-2xl text-slate-800 placeholder-slate-400" placeholder="Height" />
                </div>
            </div>

            <button onclick="calculateBMI()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-100 transition-all transform active:scale-95">
                Analyze My Health
            </button>

            <div id="resultBox" class="hidden mt-8 p-6 bg-white/40 rounded-3xl border border-white/50 animate-in fade-in zoom-in duration-500">
                <div class="text-center mb-4">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Your Score</span>
                    <div id="bmiValue" class="text-5xl font-bold text-blue-600 my-1">0.0</div>
                    <div id="categoryLabel" class="text-sm font-semibold text-slate-600">--</div>
                </div>
                
                <div class="bmi-scale mt-6">
                    <div id="bmiIndicator" class="indicator" style="left: 0%;"></div>
                </div>
                <div class="flex justify-between text-[10px] text-slate-400 mt-2 font-bold">
                    <span>18.5</span>
                    <span>25.0</span>
                    <span>30.0</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-12 text-slate-400 text-xs font-medium">
        SECURE & PRIVATE • TOOLS WONDER 2026
    </footer>

    <script>
        function calculateBMI() {
            const weight = parseFloat(document.getElementById("weight").value);
            const height = parseFloat(document.getElementById("height").value);
            const resultBox = document.getElementById("resultBox");
            const bmiValue = document.getElementById("bmiValue");
            const categoryLabel = document.getElementById("categoryLabel");
            const indicator = document.getElementById("bmiIndicator");

            if (!weight || !height || weight <= 0 || height <= 0) {
                alert("Please enter valid weight and height.");
                return;
            }

            const heightInMeters = height / 100;
            const bmi = weight / (heightInMeters * heightInMeters);
            const roundedBMI = bmi.toFixed(1);

            resultBox.classList.remove("hidden");
            bmiValue.textContent = roundedBMI;

            let category = "";
            let color = "";
            let position = 0;

            if (bmi < 18.5) {
                category = "Underweight";
                color = "#60a5fa"; // Blue
                position = (bmi / 18.5) * 25; // Map to 0-25%
            } else if (bmi < 24.9) {
                category = "Healthy Weight";
                color = "#4ade80"; // Green
                position = 25 + ((bmi - 18.5) / 6.4) * 25; // Map to 25-50%
            } else if (bmi < 29.9) {
                category = "Overweight";
                color = "#facc15"; // Yellow
                position = 50 + ((bmi - 25) / 4.9) * 25; // Map to 50-75%
            } else {
                category = "Obesity";
                color = "#f87171"; // Red
                position = Math.min(75 + ((bmi - 30) / 10) * 25, 98); // Map to 75-100%
            }

            categoryLabel.textContent = category;
            categoryLabel.style.color = color;
            bmiValue.style.color = color;
            indicator.style.left = position + "%";
            
            resultBox.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
