<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Global Currency Pro | Tools World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #bae6fd 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
            border-radius: 40px;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 123, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-input:focus {
            background: white;
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .swap-btn {
            background: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .swap-btn:hover { transform: rotate(180deg) scale(1.1); }
        .swap-btn:active { transform: rotate(180deg) scale(0.9); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: fadeInUp 0.4s ease forwards; }
    </style>
</head>
<body class="p-6">

    <div class="mb-10 text-center">
        <h2 class="text-blue-700 text-3xl font-bold tracking-tighter italic">Tools <span class="text-slate-400 font-light">World</span></h2>
        <p class="text-slate-500 text-[10px] tracking-[0.4em] uppercase mt-1">Real-Time Exchange Engine</p>
    </div>

    <main class="liquid-glass p-8 md:p-12 max-w-md w-full">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-white text-blue-600 rounded-2xl mb-4 shadow-sm border border-slate-100">
                <i class="fas fa-globe-americas text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Currency Converter</h1>
            <p class="text-slate-400 text-xs mt-1">Exchange global currencies with live-ish rates.</p>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Amount to Convert</label>
                <div class="relative">
                    <span class="absolute left-4 top-4 text-blue-500 font-bold"><i class="fas fa-wallet"></i></span>
                    <input type="number" id="amount" class="glass-input w-full p-4 pl-12 rounded-2xl text-slate-800 placeholder-slate-400 font-semibold" placeholder="0.00" />
                </div>
            </div>

            <div class="relative flex flex-col items-center">
                <div class="w-full space-y-3">
                    <select id="fromCurrency" class="glass-input w-full p-4 rounded-2xl text-slate-700 font-medium appearance-none cursor-pointer">
                        <option value="USD">🇺🇸 USD - US Dollar</option>
                        <option value="INR" selected>🇮🇳 INR - Indian Rupee</option>
                        <option value="EUR">🇪🇺 EUR - Euro</option>
                        <option value="GBP">🇬🇧 GBP - British Pound</option>
                    </select>
                    
                    <div class="flex justify-center -my-3 relative z-10">
                        <button onclick="swapCurrencies()" class="swap-btn">
                            <i class="fas fa-exchange-alt rotate-90 text-blue-500 text-xs"></i>
                        </button>
                    </div>

                    <select id="toCurrency" class="glass-input w-full p-4 rounded-2xl text-slate-700 font-medium appearance-none cursor-pointer">
                        <option value="USD" selected>🇺🇸 USD - US Dollar</option>
                        <option value="INR">🇮🇳 INR - Indian Rupee</option>
                        <option value="EUR">🇪🇺 EUR - Euro</option>
                        <option value="GBP">🇬🇧 GBP - British Pound</option>
                    </select>
                </div>
            </div>

            <button onclick="convertCurrency()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-100 transition-all active:scale-95">
                Convert Now
            </button>

            <div id="resultBox" class="hidden animate-up pt-6 border-t border-white/50">
                <div class="bg-white/40 p-6 rounded-3xl text-center border border-white">
                    <p id="conversionRate" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2"></p>
                    <h3 id="resultText" class="text-3xl font-bold text-slate-800 tracking-tight"></h3>
                    <p class="text-[10px] text-blue-500 mt-2 font-bold"><i class="fas fa-clock mr-1"></i> UPDATED LIVE</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-12 text-slate-400 text-[10px] font-bold tracking-[0.2em] uppercase">
        Vishal Suthar • M.Sc IT Development
    </footer>

    <script>
        // Professional Exchange Rates (Mock Live Data)
        const exchangeRates = {
            USD: { USD: 1, INR: 83.35, EUR: 0.92, GBP: 0.79 },
            INR: { USD: 0.012, INR: 1, EUR: 0.011, GBP: 0.0095 },
            EUR: { USD: 1.09, INR: 90.58, EUR: 1, GBP: 0.86 },
            GBP: { USD: 1.26, INR: 105.42, EUR: 1.17, GBP: 1 }
        };

        function swapCurrencies() {
            const from = document.getElementById("fromCurrency");
            const to = document.getElementById("toCurrency");
            const temp = from.value;
            from.value = to.value;
            to.value = temp;
        }

        function convertCurrency() {
            const amount = parseFloat(document.getElementById("amount").value);
            const from = document.getElementById("fromCurrency").value;
            const to = document.getElementById("toCurrency").value;
            const resultBox = document.getElementById("resultBox");

            if (!amount || amount <= 0) {
                alert("Please enter a valid amount.");
                return;
            }

            const rate = exchangeRates[from][to];
            const converted = (amount * rate).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            
            resultBox.classList.remove("hidden");
            document.getElementById("conversionRate").innerText = `1 ${from} = ${rate} ${to}`;
            document.getElementById("resultText").innerText = `${converted} ${to}`;
            
            resultBox.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
