<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Converter | Tools Wonder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.1), 0 8px 10px -6px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 py-4 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-xl font-bold text-blue-600">Tools <span class="text-slate-400 font-normal">World</span></div>
            <a href="index.html" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition">Back to Home</a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white custom-shadow rounded-2xl p-8 max-w-lg w-full border border-blue-50">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-full mb-4">
                    <i class="fas fa-sync-alt text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Image Converter</h1>
                <p class="text-slate-500 text-sm">Convert your images to PNG, JPG, GIF, or WebP instantly.</p>
            </div>

            <div class="space-y-4">
                <div class="relative group">
                    <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                    <div class="border-2 border-dashed border-blue-200 group-hover:border-blue-400 rounded-xl p-8 text-center transition bg-blue-50/30">
                        <i class="fas fa-cloud-upload-alt text-3xl text-blue-400 mb-2"></i>
                        <p class="text-sm font-medium text-slate-600" id="fileName">Click or drag image here</p>
                    </div>
                </div>

                <div class="flex gap-2">
                    <select id="formatSelect" class="flex-grow bg-white border border-slate-200 rounded-lg px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                        <option value="png">Output: PNG</option>
                        <option value="jpeg">Output: JPG</option>
                        <option value="gif">Output: GIF</option>
                        <option value="webp">Output: WebP</option>
                    </select>
                    <button onclick="convertImage()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-lg transition flex items-center gap-2">
                        <span>Convert</span>
                        <i class="fas fa-arrow-right text-xs"></i>
                    </button>
                </div>
            </div>

            <div id="previewContainer" class="mt-8 hidden">
                <div class="border-t border-slate-100 pt-6">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Preview & Download</h2>
                    <div class="rounded-lg overflow-hidden border border-slate-200 bg-slate-50">
                        <img id="outputImage" src="" alt="Converted" class="max-h-64 mx-auto block" />
                    </div>
                    <a id="downloadBtn" href="#" download="converted-image" class="mt-4 w-full bg-slate-800 hover:bg-black text-white text-center py-3 rounded-lg font-semibold flex items-center justify-center gap-2 transition">
                        <i class="fas fa-download"></i>
                        Download Converted Image
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-slate-400 text-xs">
        &copy; 2026 Tools Wonder | toolsworld0380@gmail.com
    </footer>

    <script>
        const input = document.getElementById('imageInput');
        const fileName = document.getElementById('fileName');
        const previewContainer = document.getElementById('previewContainer');
        const outputImage = document.getElementById('outputImage');
        const downloadBtn = document.getElementById('downloadBtn');
        let originalFile;

        input.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                originalFile = e.target.files[0];
                fileName.innerText = originalFile.name;
                fileName.classList.add('text-blue-600');
            }
        });

        function convertImage() {
            if (!originalFile) return alert("Please upload an image first.");

            const format = document.getElementById("formatSelect").value;
            const reader = new FileReader();

            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement("canvas");
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0);

                    canvas.toBlob(function(blob) {
                        const url = URL.createObjectURL(blob);
                        outputImage.src = url;
                        downloadBtn.href = url;
                        downloadBtn.download = `tools-wonder-${Date.now()}.${format}`;
                        
                        previewContainer.classList.remove('hidden');
                        previewContainer.scrollIntoView({ behavior: 'smooth' });
                    }, `image/${format}`, 0.9);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(originalFile);
        }
    </script>
</body>
</html>
