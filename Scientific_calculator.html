<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calculator | Tools Wonder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 0% 0%, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            overflow: hidden;
        }

        /* Apple Liquid Glass Effect */
        .glass-calculator {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
            border-radius: 40px;
        }

        .display-area {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Button Styling */
        .calc-btn {
            height: 64px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: white;
        }

        .btn-number { background: rgba(255, 255, 255, 0.1); }
        .btn-number:hover { background: rgba(255, 255, 255, 0.2); }
        
        .btn-function { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .btn-function:hover { background: rgba(59, 130, 246, 0.3); }

        .btn-operator { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .btn-operator:hover { background: rgba(245, 158, 11, 0.4); }

        .btn-action { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .btn-action:hover { background: rgba(239, 68, 68, 0.4); }

        .btn-equals { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); 
            color: white;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }
        .btn-equals:hover { transform: scale(1.02); filter: brightness(1.1); }

        .calc-btn:active { transform: scale(0.92); opacity: 0.8; }

        /* Custom Scrollbar for Display */
        #display::-webkit-scrollbar { height: 4px; }
        #display::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="mb-8 text-center animate-fade-in">
        <h2 class="text-white text-3xl font-bold tracking-tighter italic">Tools <span class="font-light text-blue-400">Wonder</span></h2>
        <p class="text-blue-200/40 text-[10px] tracking-[0.4em] uppercase mt-1">Advanced Scientific Engine</p>
    </div>

    <div class="glass-calculator p-6 md:p-8 w-full max-w-md">
        
        <div class="display-area p-6 mb-8">
            <div id="history" class="text-right text-slate-500 text-sm h-6 overflow-hidden mb-1 font-light"></div>
            <input type="text" id="display" readonly 
                class="w-full bg-transparent text-right text-4xl text-white font-light focus:outline-none overflow-x-auto" 
                placeholder="0">
        </div>

        <div class="grid grid-cols-4 gap-3">
            <button class="calc-btn btn-action" onclick="clearDisplay()">AC</button>
            <button class="calc-btn btn-function" onclick="backspace()"><i class="fas fa-backspace"></i></button>
            <button class="calc-btn btn-function" onclick="insert('(')">(</button>
            <button class="calc-btn btn-function" onclick="insert(')')">)</button>

            <button class="calc-btn btn-function text-sm" onclick="insert('Math.sin(')">sin</button>
            <button class="calc-btn btn-function text-sm" onclick="insert('Math.cos(')">cos</button>
            <button class="calc-btn btn-function text-sm" onclick="insert('Math.tan(')">tan</button>
            <button class="calc-btn btn-operator" onclick="insert('/')">÷</button>

            <button class="calc-btn btn-number" onclick="insert('7')">7</button>
            <button class="calc-btn btn-number" onclick="insert('8')">8</button>
            <button class="calc-btn btn-number" onclick="insert('9')">9</button>
            <button class="calc-btn btn-operator" onclick="insert('*')">×</button>

            <button class="calc-btn btn-number" onclick="insert('4')">4</button>
            <button class="calc-btn btn-number" onclick="insert('5')">5</button>
            <button class="calc-btn btn-number" onclick="insert('6')">6</button>
            <button class="calc-btn btn-operator" onclick="insert('-')">−</button>

            <button class="calc-btn btn-number" onclick="insert('1')">1</button>
            <button class="calc-btn btn-number" onclick="insert('2')">2</button>
            <button class="calc-btn btn-number" onclick="insert('3')">3</button>
            <button class="calc-btn btn-operator" onclick="insert('+')">+</button>

            <button class="calc-btn btn-function" onclick="insert('Math.sqrt(')">√</button>
            <button class="calc-btn btn-number" onclick="insert('0')">0</button>
            <button class="calc-btn btn-number" onclick="insert('.')">.</button>
            <button class="calc-btn btn-equals" onclick="calculate()">=</button>
        </div>

        <div class="grid grid-cols-4 gap-3 mt-3">
            <button class="calc-btn btn-function text-xs" onclick="insert('Math.log10(')">log</button>
            <button class="calc-btn btn-function text-xs" onclick="insert('Math.exp(')">exp</button>
            <button class="calc-btn btn-function text-xs" onclick="insert('**2')">x²</button>
            <button class="calc-btn btn-function text-xs" onclick="insert('Math.PI')">π</button>
        </div>
    </div>

    <footer class="mt-8 text-slate-500 text-[10px] tracking-widest font-medium">
        DESIGNED BY VISHAL SUTHAR • 2026
    </footer>

    <script>
        const display = document.getElementById('display');
        const history = document.getElementById('history');

        function insert(value) {
            if (display.value === '0' || display.value === 'Error') {
                display.value = value;
            } else {
                display.value += value;
            }
        }

        function clearDisplay() {
            display.value = '';
            history.innerText = '';
        }

        function backspace() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                let expression = display.value;
                // Prettify history before calculation
                history.innerText = expression.replace(/Math\./g, '');
                
                // Handle calculation
                const result = eval(expression);
                
                if (result === undefined || isNaN(result)) {
                    display.value = "Error";
                } else {
                    // Limit decimal places for clean UI
                    display.value = Number.isInteger(result) ? result : parseFloat(result.toFixed(8));
                }
            } catch (e) {
                display.value = "Error";
            }
        }

        // Support Keyboard Input
        document.addEventListener('keydown', (e) => {
            if (e.key >= 0 && e.key <= 9) insert(e.key);
            if (e.key === '+') insert('+');
            if (e.key === '-') insert('-');
            if (e.key === '*') insert('*');
            if (e.key === '/') insert('/');
            if (e.key === '.') insert('.');
            if (e.key === 'Enter') calculate();
            if (e.key === 'Backspace') backspace();
            if (e.key === 'Escape') clearDisplay();
        });
    </script>
</body>
</html>
